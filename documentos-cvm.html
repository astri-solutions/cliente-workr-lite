<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documentos CVM — Workr Lite Teste RI</title>
    <meta name="description" content="ITR, DFP, IANe e demais documentos regulatórios." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/main.scss" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="site-topbar"></div>
    <header id="site-header"></header>

    <main>
      <section class="page-header" aria-labelledby="page-title">
        <img class="page-header__bg"
             src="/assets/imagens/page-bg.jpg"
             alt="" aria-hidden="true" />
        <div class="page-header__overlay" aria-hidden="true"></div>
        <div class="page-header__inner">
          <ol class="page-header__breadcrumb" aria-label="Você está em">
            <li><a href="/">Home</a></li>
            <li><a href="/documentos-cvm.html">Governança</a></li>
            <li aria-current="page">Documentos CVM</li>
          </ol>
          <h1 id="page-title" class="page-header__title">Documentos CVM</h1>
          <p class="page-header__lede">ITR, DFP, IANe e demais documentos regulatórios.</p>
        </div>
      </section>

      <section class="page-section" aria-label="Documentos CVM" data-reveal>
        <div class="page-section__container">
          <div class="filter-bar">
            <div class="filter-bar__group">
              <span class="filter-bar__label">Filtrar por:</span>
              <div class="select">
                <select aria-label="Ano">
                  <option>2026</option>
                  <option>2025</option>
                  <option>2024</option>
                  <option>2023</option>
                </select>
              </div>
            </div>
          </div>

          <div class="accordion accordion--primary">
            <!-- Item 1: aberto -->
            <div class="accordion__item accordion__item--open">
              <button class="accordion__trigger" type="button" aria-expanded="true">
                Informações Trimestrais (ITR)
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="accordion__body">
                <div class="doc-row">
                  <span class="doc-row__date">14/05/2026</span>
                  <span class="doc-row__title">ITR — 1T26 — Informações Trimestrais</span>
                  <a href="#" class="doc-row__pdf" aria-label="Baixar PDF">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
                  </a>
                </div>
              </div>
            </div>
            <!-- Item 2 -->
            <div class="accordion__item">
              <button class="accordion__trigger" type="button" aria-expanded="false">
                Formulário de Referência
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="accordion__body"></div>
            </div>
            <!-- Item 3 -->
            <div class="accordion__item">
              <button class="accordion__trigger" type="button" aria-expanded="false">
                Formulário Cadastral
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="accordion__body"></div>
            </div>
            <!-- Item 4 -->
            <div class="accordion__item">
              <button class="accordion__trigger" type="button" aria-expanded="false">
                Fatos Relevantes
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="accordion__body"></div>
            </div>
            <!-- Item 5 -->
            <div class="accordion__item">
              <button class="accordion__trigger" type="button" aria-expanded="false">
                Comunicados ao Mercado
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="accordion__body"></div>
            </div>
            <!-- Item 6 -->
            <div class="accordion__item">
              <button class="accordion__trigger" type="button" aria-expanded="false">
                Aviso aos Acionistas
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="accordion__body"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <div class="search-overlay" id="search-overlay" aria-hidden="true" aria-label="Busca" role="dialog">
      <div class="search-overlay__inner">
        <div class="search-overlay__box">
          <svg class="search-overlay__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-overlay__input" type="search" placeholder="O que você está procurando?" aria-label="Campo de busca" data-search-input />
          <button class="search-overlay__close" type="button" aria-label="Fechar busca" data-search-close>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <p class="search-overlay__hint">Pressione <kbd>ESC</kbd> para fechar</p>
      </div>
    </div>

    <script type="module" src="/scripts/page.js"></script>
  </body>
</html>
